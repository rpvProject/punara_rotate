# FUTURE canonical stack (blueprint/_canon.md §11, 08_technical_architecture.md).
# NOT USED BY v0 — v0 runs on SQLite + DuckDB with zero services (docs/ADR-001-v0-storage.md).
# When Docker is available: `docker compose up`, then set
#   LENS_DB_URL=postgresql+psycopg://punara:punara@127.0.0.1:5432/lens
# and point the OLAP layer at ClickHouse. All ports 127.0.0.1-bound: local-only, always.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: punara
      POSTGRES_PASSWORD: punara # local-only; never a real credential
      POSTGRES_DB: lens
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "127.0.0.1:8123:8123" # HTTP
      - "127.0.0.1:9000:9000" # native
    volumes:
      - ch_data:/var/lib/clickhouse

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  pg_data:
  ch_data:
